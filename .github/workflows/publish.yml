name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const { version } = JSON.parse(readFileSync("package.json", "utf8"));
          const expectedTag = `v${version}`;
          const actualTag = process.env.GITHUB_REF_NAME;

          if (actualTag !== expectedTag) {
            console.error(
              `Tag ${actualTag} does not match package.json version ${version}. Expected ${expectedTag}.`
            );
            process.exit(1);
          }
          NODE

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npx vitest run --exclude test/mcp-smoke.test.ts --exclude test/server-pool.test.ts

      - name: Publish
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            --latest \
            --verify-tag
